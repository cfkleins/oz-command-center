<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZ Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --accent3: #9b8ec4;
    --text: #f5f3ee;
    --text-muted: #a8b0bc;
    --text-dim: #5a6275;
    --concept: #3d4452;
    --scoped: #1a3a4a;
    --active: #1a3a2a;
    --blocked: #3a1a1a;
    --complete: #1a2a1a;
    --archived: #1e1e24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 10;
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-left {}

  .system-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    opacity: 0.8;
  }

  .title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .title span {
    color: var(--accent);
    font-style: italic;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.5rem;
  }

  .oz-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #b8c0cc;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .timestamp {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  /* Phase legend */
  .phase-legend {
    position: relative;
    z-index: 10;
    padding: 0.75rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .legend-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-right: 0.5rem;
  }

  .phase-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid;
  }

  /* Stats bar */
  .stats-bar {
    position: relative;
    z-index: 10;
    padding: 1rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* Board */
  .board {
    position: relative;
    z-index: 10;
    padding: 2rem 2.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeIn 0.4s ease both;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.4s; }
  .card:nth-child(9) { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.5s; }

  /* Phase accent bar */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card.concept::before { background: var(--text-dim); }
  .card.scoped::before { background: var(--accent2); }
  .card.active::before { background: #4ade80; }
  .card.blocked::before { background: #f87171; }
  .card.complete::before { background: var(--accent); }
  .card.archived::before { background: var(--text-dim); opacity: 0.3; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--text);
    line-height: 1.3;
  }

  .phase-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
    border: 1px solid;
  }

  .concept .phase-badge { color: var(--text-muted); border-color: var(--text-dim); background: rgba(255,255,255,0.02); }
  .scoped .phase-badge { color: var(--accent2); border-color: rgba(126,184,201,0.3); background: rgba(126,184,201,0.05); }
  .active .phase-badge { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.05); }
  .blocked .phase-badge { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.05); }
  .complete .phase-badge { color: var(--accent); border-color: rgba(200,169,110,0.3); background: rgba(200,169,110,0.05); }
  .archived .phase-badge { color: var(--text-dim); border-color: var(--text-dim); background: transparent; }

  .card-desc {
    font-size: 0.78rem;
    color: #b8c0cc;
    line-height: 1.5;
    margin-bottom: 1rem;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }

  .meta-row {
    display: flex;
    gap: 0.5rem;
    align-items: baseline;
  }

  .meta-key {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 52px;
    flex-shrink: 0;
  }

  .meta-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: #b8c0cc;
    line-height: 1.4;
  }

  .meta-val.highlight { color: var(--accent); }
  .meta-val.warn { color: #f87171; }
  .meta-val.ok { color: #4ade80; }

  /* Token budget mini bar */
  .token-bar {
    margin-top: 0.3rem;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .token-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  .token-fill.over { background: #f87171; }

  .priority-indicator {
    display: inline-flex;
    gap: 2px;
    align-items: center;
  }

  .priority-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .priority-dot.filled { background: var(--accent); }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    padding: 1.5rem 2.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .footer-left {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .footer-right {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header, .board, .stats-bar, .phase-legend, .footer {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .board { grid-template-columns: 1fr; }
    .stats-bar { gap: 1rem; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="system-label">Chuck · Counsel · Oz — Project Command Center</div>
    <h1 class="title">OZ <span>Command</span> Center</h1>
  </div>
  <div class="header-right">
    <div class="oz-status">
      <div class="status-dot"></div>
      Oz operational
    </div>
    <div class="timestamp" id="ts"></div>
  </div>
</header>

<div class="phase-legend">
  <span class="legend-label">Phases:</span>
  <span class="phase-pill" style="color:#6b7280;border-color:#3d4452;background:rgba(255,255,255,0.02)">Concept</span>
  <span class="phase-pill" style="color:#7eb8c9;border-color:rgba(126,184,201,0.3);background:rgba(126,184,201,0.05)">Scoped</span>
  <span class="phase-pill" style="color:#4ade80;border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.05)">Active</span>
  <span class="phase-pill" style="color:#f87171;border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.05)">Blocked</span>
  <span class="phase-pill" style="color:#c8a96e;border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.05)">Complete</span>
  <span class="phase-pill" style="color:#3d4452;border-color:#2a2f3a;background:transparent">Archived</span>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="total-projects">10</div>
    <div class="stat-label">Projects</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-value" id="active-count">3</div>
    <div class="stat-label">Active</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-value" id="blocked-count">1</div>
    <div class="stat-label">Blocked</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-value">~$12</div>
    <div class="stat-label">Est. Spend</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-value">~$3</div>
    <div class="stat-label">Actual</div>
  </div>
</div>

<main class="board" id="board"></main>

<footer class="footer">
  <div class="footer-left">Updated by Oz · Priorities set by Chuck + Counsel</div>
  <div class="footer-right">v0.1 · First Cut · Iterate with TQM</div>
</footer>

<script>
const projects = [
  {
    id: 1,
    title: "OZ Reliability & Infrastructure",
    phase: "active",
    desc: "Make Oz dependable, trustworthy, and self-recovering. Chuck needs to trust execution. Stability is the foundation everything else rests on.",
    priority: 5,
    tokenEst: 15000,
    tokenActual: 4200,
    model: "Opus 4.6 / Sonnet 4.6",
    waitingOn: null,
    nextAction: "Monitor cron job reliability over 7-day window",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 2,
    title: "Project Command Center",
    phase: "active",
    desc: "This dashboard. Real-time visual project board accessible from any device. Kanban-style with token budgets, blockers, and next actions.",
    priority: 5,
    tokenEst: 8000,
    tokenActual: 3500,
    model: "Sonnet 4.6",
    waitingOn: "Vercel deployment by Chuck",
    nextAction: "Deploy to Vercel, share URL, iterate on design",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 3,
    title: "Weekly Mission Brief",
    phase: "active",
    desc: "Revised format: back to first Brief structure. Docx emailed to Chuck, MP to Obsidian. Must be readable and useful to a human. Produced Sunday 7PM PT.",
    priority: 4,
    tokenEst: 5000,
    tokenActual: 1800,
    model: "Sonnet 4.6",
    waitingOn: null,
    nextAction: "Revise prompt template to match first-format spec",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 4,
    title: "CFKlein Corpus Processing",
    phase: "scoped",
    desc: "Build curated reference library of essential texts shaping Chuck's thinking. NotebookLM as platform. Refresher training, quizzes, reviews. Spark Reports from Counsel.",
    priority: 4,
    tokenEst: 25000,
    tokenActual: 0,
    model: "TBD — NotebookLM + Claude",
    waitingOn: "Chuck to identify initial corpus texts",
    nextAction: "Chuck provides first book list; Counsel sets up NotebookLM structure",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 5,
    title: "Video Funnel — YouTube Management",
    phase: "concept",
    desc: "System for managing, processing, and extracting value from YouTube videos Chuck watches. Includes Andrej Karpathy No Priors episode as first test case.",
    priority: 3,
    tokenEst: 10000,
    tokenActual: 0,
    model: "Sonnet 4.6",
    waitingOn: "Scope definition with Counsel",
    nextAction: "Define: what does 'managing' a video mean? Summarize, tag, extract insights?",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 6,
    title: "Annual Photo Album",
    phase: "concept",
    desc: "Reduce and curate picture inventory. Annual album production. Scope and tooling TBD.",
    priority: 2,
    tokenEst: 5000,
    tokenActual: 0,
    model: "TBD",
    waitingOn: "Prioritization by Chuck",
    nextAction: "Scope session with Counsel",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 7,
    title: "Annual Summaries & Journal Processing",
    phase: "concept",
    desc: "Process journal entries into annual summaries. Connected to Obsidian and Open Brain consolidation pipeline.",
    priority: 3,
    tokenEst: 12000,
    tokenActual: 0,
    model: "Sonnet 4.6",
    waitingOn: "OZ consolidation loop stability confirmed",
    nextAction: "Review existing journal ingestion cron output",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 8,
    title: "Token Management & Economics",
    phase: "active",
    desc: "Estimate and track token/cost allocation across projects. Rough budgeting, model selection guidance, spend visibility. This dashboard includes first implementation.",
    priority: 4,
    tokenEst: 4000,
    tokenActual: 1000,
    model: "Sonnet 4.6",
    waitingOn: null,
    nextAction: "Define per-project token estimate methodology",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 9,
    title: "Resume / Bio",
    phase: "concept",
    desc: "Chuck's professional bio and resume. Updated to reflect current work with AI systems, Grand Synthesis, and OZ project.",
    priority: 2,
    tokenEst: 3000,
    tokenActual: 0,
    model: "Sonnet 4.6",
    waitingOn: "Chuck's direction on purpose and audience",
    nextAction: "Scoping conversation: what's this for?",
    blocker: null,
    lastUpdated: "2026-03-24"
  },
  {
    id: 10,
    title: "Knowledge Consolidation Pipeline",
    phase: "blocked",
    desc: "OneNote migration, Readwise integration, Recall.ai notes, OneDrive/Drive reorganization. The full migration of Chuck's distributed intellectual assets into a coherent system.",
    priority: 3,
    tokenEst: 40000,
    tokenActual: 0,
    model: "Opus 4.6 + Sonnet 4.6",
    waitingOn: "OZ stability confirmed; priority sequencing by Chuck",
    nextAction: "Chuck decides which knowledge source to migrate first",
    blocker: "Awaiting OZ reliability baseline before adding migration load",
    lastUpdated: "2026-03-24"
  }
];

function priorityDots(n) {
  let html = '<span class="priority-indicator">';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="priority-dot ${i <= n ? 'filled' : ''}"></span>`;
  }
  return html + '</span>';
}

function tokenBar(est, actual) {
  if (est === 0) return '';
  const pct = Math.min((actual / est) * 100, 100);
  const over = actual > est;
  return `<div class="token-bar"><div class="token-fill ${over ? 'over' : ''}" style="width:${pct}%"></div></div>`;
}

function costEst(tokens, model) {
  // Rough estimates: Opus ~$15/M in, Sonnet ~$3/M in
  const rate = model.includes('Opus') ? 0.015 : 0.003;
  const cost = (tokens / 1000) * rate;
  return cost < 0.01 ? '< $0.01' : '$' + cost.toFixed(2);
}

function renderCard(p) {
  const phaseLabels = { concept: 'Concept', scoped: 'Scoped', active: 'Active', blocked: 'Blocked', complete: 'Complete', archived: 'Archived' };
  const tokenPct = p.tokenEst > 0 ? Math.round((p.tokenActual / p.tokenEst) * 100) : 0;

  return `
  <div class="card ${p.phase}">
    <div class="card-header">
      <div class="card-title">${p.title}</div>
      <div class="phase-badge">${phaseLabels[p.phase]}</div>
    </div>
    <div class="card-desc">${p.desc}</div>
    <div class="card-meta">
      <div class="meta-row">
        <span class="meta-key">Priority</span>
        <span class="meta-val">${priorityDots(p.priority)}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Tokens</span>
        <span class="meta-val">Est ~${p.tokenEst.toLocaleString()} · Actual ${p.tokenActual.toLocaleString()} (${tokenPct}%)</span>
      </div>
      ${p.tokenEst > 0 ? tokenBar(p.tokenEst, p.tokenActual) : ''}
      <div class="meta-row">
        <span class="meta-key">Est Cost</span>
        <span class="meta-val highlight">${costEst(p.tokenEst, p.model)}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Model</span>
        <span class="meta-val">${p.model}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Next</span>
        <span class="meta-val ok">${p.nextAction}</span>
      </div>
      ${p.waitingOn ? `<div class="meta-row"><span class="meta-key">Waiting</span><span class="meta-val">${p.waitingOn}</span></div>` : ''}
      ${p.blocker ? `<div class="meta-row"><span class="meta-key">Blocker</span><span class="meta-val warn">${p.blocker}</span></div>` : ''}
      <div class="meta-row">
        <span class="meta-key">Updated</span>
        <span class="meta-val">${p.lastUpdated}</span>
      </div>
    </div>
  </div>`;
}

// Sort: active first, then scoped, blocked, concept, complete, archived
const phaseOrder = { active: 0, blocked: 1, scoped: 2, concept: 3, complete: 4, archived: 5 };
const sorted = [...projects].sort((a, b) => {
  if (phaseOrder[a.phase] !== phaseOrder[b.phase]) return phaseOrder[a.phase] - phaseOrder[b.phase];
  return b.priority - a.priority;
});

document.getElementById('board').innerHTML = sorted.map(renderCard).join('');

// Stats
document.getElementById('active-count').textContent = projects.filter(p => p.phase === 'active').length;
document.getElementById('blocked-count').textContent = projects.filter(p => p.phase === 'blocked').length;

// Timestamp
function updateTs() {
  const now = new Date();
  document.getElementById('ts').textContent = now.toLocaleDateString('en-US', {
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
  });
}
updateTs();
setInterval(updateTs, 60000);
</script>
</body>
</html>
